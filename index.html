<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普久原電機 工数管理システム V2.0</title>

    <link rel="stylesheet" href="css/style.css">

    <script defer src="js/database.js"></script>
<script defer src="js/dashboard.js"></script>
<script defer src="js/kousu.js"></script>
<script defer src="js/anken.js"></script>
<script defer src="js/app.js"></script>
</head>

<body>

<div id="app">

    <aside id="sidebar">

        <div class="logo">
            <h2>普久原電機</h2>
            <small>工数管理システム V2.0</small>
        </div>

        <nav>
            <button class="menu active" data-screen="dashboard">🏠 Dashboard</button>
            <button class="menu" data-screen="timecard">⏰ タイムカード</button>
            <button class="menu" data-screen="kousu">📝 工数入力</button>
            <button class="menu" data-screen="anken">📁 案件管理</button>
            <button class="menu" data-screen="report">📊 集計</button>
            <button class="menu" data-screen="setting">⚙ 設定</button>
        </nav>

    </aside>

    <main id="main">

        <header>
            <h1 id="screenTitle">Dashboard</h1>
            <div id="today"></div>
        </header>

        <section id="content">

            <div id="dashboard" class="screen">

                <div class="cards">

                    <div class="card">
                        <h3>勤務時間</h3>
                        <div class="value" id="workHours">0.0 h</div>
                    </div>

                    <div class="card">
                        <h3>工数入力</h3>
                        <div class="value" id="inputHours">0.0 h</div>
                    </div>

                    <div class="card">
                        <h3>残り</h3>
                        <div class="value" id="remainHours">0.0 h</div>
                    </div>

                </div>

                <div class="progressBox">
                    <div class="progress">
                        <div id="progressBar"></div>
                    </div>
                </div>

            </div>

            <div id="timecard" class="screen hidden">
                <h2>タイムカード</h2>
                <p>（次のバージョンで実装）</p>
            </div>

            <div id="kousu" class="screen hidden">

                <div class="card">

                    <h2>工数入力</h2>

                    <label>客先</label>
                    <select id="customerSelect">
                        <option value="">選択してください</option>
                    </select>

                    <label>件名</label>
                    <select id="projectSelect">
                        <option value="">選択してください</option>
                    </select>

                    <label>内容</label>
                    <select id="contentSelect">
                        <option value="">選択してください</option>
                    </select>

                    <label>工数</label>
                    <input type="number" id="hourInput" step="0.25" min="0">

                    <button class="btn" id="saveKousu">登録</button>

                </div>

                <br>

                <div class="card">

                    <h2>本日の工数一覧</h2>

                    <table>
                        <thead>
                            <tr>
                                <th>客先</th>
                                <th>件名</th>
                                <th>内容</th>
                                <th>工数</th>
                            </tr>
                        </thead>

                        <tbody id="todayTable"></tbody>
                    </table>

                    <br>

                    <h3>
                        工数合計 :
                        <span id="todayTotal">0</span>
                        h
                    </h3>

                </div>

            </div>

            <div id="anken" class="screen hidden">

    <div class="card">
        <h2>案件管理</h2>

        <label>客先名</label>
        <input type="text" id="newCustomerName" placeholder="例：日本電商">

        <button class="btn" onclick="Anken.addCustomer()">
            客先追加
        </button>
    </div>

    <br>

    <div class="card">
        <label>客先選択</label>
        <select id="ankenCustomerSelect"></select>

        <label>件名</label>
        <input type="text" id="newProjectName" placeholder="例：制御盤製作">

        <button class="btn" onclick="Anken.addProject()">
            件名追加
        </button>
    </div>

    <br>

    <div class="card">
        <label>件名選択</label>
        <select id="ankenProjectSelect"></select>

        <label>内容</label>
        <input type="text" id="newContentName" placeholder="例：配線">

        <button class="btn" onclick="Anken.addContent()">
            内容追加
        </button>
    </div>

    <br>

    <div class="card">
        <h2>案件一覧</h2>
        <div id="ankenList"></div>
    </div>

</div>

            <div id="report" class="screen hidden">
                <h2>集計</h2>
            </div>

            <div id="setting" class="screen hidden">
                <h2>設定</h2>
            </div>

        </section>

    </main>

</div>

</body>
</html>
